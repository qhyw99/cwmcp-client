name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on manylinux2014
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build executable in manylinux2014
      run: |
        docker run --rm \
          -e HOME=/tmp \
          -v "$PWD":/work \
          -w /work \
          quay.io/pypa/manylinux2014_x86_64 \
          /bin/bash -lc '
            # 直接使用 manylinux 自带的 Python 3.10
            PY_BIN="/opt/python/cp310-cp310/bin/python"
            
            # 创建虚拟环境
            "$PY_BIN" -m venv /tmp/venv
            
            # 升级基础工具并安装项目依赖
            # 注意：如果你的 setup.py/pyproject.toml 中没有包含 pyinstaller，请在这里手动加上 pyinstaller
            /tmp/venv/bin/python -m pip install --upgrade pip setuptools wheel
            /tmp/venv/bin/pip install pyinstaller
            /tmp/venv/bin/pip install .
            
            # 运行打包脚本
            /tmp/venv/bin/python build.py
            
            # 重命名产物
            mv dist/cwmcp-client dist/cwmcp-client-linux
          '

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-ubuntu-22.04
        path: dist/cwmcp-client-*

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/cwmcp-client-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-others:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install .

    - name: Build executable
      run: python build.py

    - name: Rename artifact for release
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/cwmcp-client.exe dist/cwmcp-client-windows.exe
        elif [ "${{ runner.os }}" == "macOS" ]; then
          mv dist/cwmcp-client dist/cwmcp-client-macos
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-${{ matrix.os }}
        path: dist/cwmcp-client-*

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/cwmcp-client-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}