name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on manylinux2014
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build executable in manylinux2014
      run: |
        docker run --rm \
          -e HOME=/tmp \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/work \
          -w /work \
          quay.io/pypa/manylinux2014_x86_64 \
          /bin/bash -lc '
            PY_VER=3.10.14
            PY_PREFIX=/tmp/python-shared
            cd /tmp
            curl -fsSLO "https://www.python.org/ftp/python/${PY_VER}/Python-${PY_VER}.tgz"
            tar -xzf "Python-${PY_VER}.tgz"
            cd "Python-${PY_VER}"
            ./configure --prefix="${PY_PREFIX}" --enable-shared --with-ensurepip=install
            make -j"$(nproc)"
            make install
            export LD_LIBRARY_PATH="${PY_PREFIX}/lib:${LD_LIBRARY_PATH}"
            "${PY_PREFIX}/bin/python3.10" -m venv /tmp/venv
            /tmp/venv/bin/python -m pip install --upgrade pip
            /tmp/venv/bin/pip install .
            /tmp/venv/bin/python build.py
          '

    - name: Rename artifact for release
      run: mv dist/cwmcp-client dist/cwmcp-client-linux

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-ubuntu-22.04
        path: dist/cwmcp-client-*

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/cwmcp-client-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-others:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Build executable
      run: python build.py

    - name: Rename artifact for release
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/cwmcp-client.exe dist/cwmcp-client-windows.exe
        elif [ "${{ runner.os }}" == "macOS" ]; then
          mv dist/cwmcp-client dist/cwmcp-client-macos
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-${{ matrix.os }}
        path: dist/cwmcp-client-*

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/cwmcp-client-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
