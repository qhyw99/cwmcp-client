name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on Debian Bookworm
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build executable in Debian Bookworm
      run: |
        docker run --rm \
          -v "$PWD":/work \
          -w /work \
          python:3.10-slim-bookworm \
          /bin/bash -c '
            set -e
            apt-get update && apt-get install -y binutils
            pip install --upgrade pip setuptools wheel
            pip install pyinstaller
            pip install .
            
            # Run build script
            python build.py
            
            # Rename artifact
            mv dist/cwmcp-client dist/cwmcp-client-linux
          '

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-ubuntu-22.04
        path: dist/cwmcp-client-*

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/cwmcp-client-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-others:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install .

    - name: Build executable
      run: python build.py

    - name: Rename artifact for release
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/cwmcp-client.exe dist/cwmcp-client-windows.exe
        elif [ "${{ runner.os }}" == "macOS" ]; then
          mv dist/cwmcp-client dist/cwmcp-client-macos
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-${{ matrix.os }}
        path: dist/cwmcp-client-*

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/cwmcp-client-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}