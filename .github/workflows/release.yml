name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on manylinux2014 (glibc 2.17)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Package cw-skill
      run: bash cw-skill/package_zip.sh

    - name: Build executable in manylinux2014 with Conda
      run: |
        docker run --rm \
          -v "$PWD":/work \
          -w /work \
          quay.io/pypa/manylinux2014_x86_64 \
          /bin/bash -c '
            set -e
            
            # 1. 下载支持 glibc 2.17 的指定版本 Miniconda (自带 Python 3.10)
            curl -O https://repo.anaconda.com/miniconda/Miniconda3-py310_23.5.2-0-Linux-x86_64.sh
            
            # 2. 静默安装
            bash Miniconda3-py310_23.5.2-0-Linux-x86_64.sh -b -p /opt/conda
            export PATH="/opt/conda/bin:$PATH"
            
            # 确认 Python 版本
            python --version
            
            # 3. 更新 pip 并安装依赖
            pip install --upgrade pip setuptools wheel
            pip install pyinstaller
            pip install .
            
            # 4. 运行打包脚本
            python build.py
            
            # 5. 重命名产物
            mv dist/cwmcp-client dist/cwmcp-client-linux
          '

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-ubuntu-22.04
        path: |
          dist/cwmcp-client-*
          cw-skill/cw-skill.zip

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/cwmcp-client-*
          cw-skill/cw-skill.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-others:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install .

    - name: Build executable
      run: python build.py

    - name: Rename artifact for release
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/cwmcp-client.exe dist/cwmcp-client-windows.exe
        elif [ "${{ runner.os }}" == "macOS" ]; then
          mv dist/cwmcp-client dist/cwmcp-client-macos
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cwmcp-client-${{ matrix.os }}
        path: dist/cwmcp-client-*

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/cwmcp-client-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
